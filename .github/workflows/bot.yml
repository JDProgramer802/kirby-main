# Bot WhatsApp en GitHub Actions (runner ubuntu-latest).
#
# IMPORTANTE: un job hosted tiene límite ~6 h; no es un VPS 24/7 permanente.
# Para 24/7 real: runner self-hosted, Railway, VPS, etc.
#
# Estructura del repo: carpeta `bot/` en la raíz del repositorio.
#
# ── Secrets (Settings → Secrets and variables → Actions) ─────────────────────
# Obligatorios:
#   DATABASE_URL     — PostgreSQL (Supabase URI con sslmode=require)
#   BOT_OWNER        — JID del dueño (ej. 521...@s.whatsapp.net)
#
# Recomendados:
#   BOT_PREFIX       — default /
#   BOT_NAME         — nombre del bot
#   SESSION_DIR      — default ./sessions/main
#   JWT_SECRET       — secreto para el panel web (si usas el mismo deploy)
#   SUBBOTS          — JSON opcional de instancias múltiples
#   LOG_LEVEL        — silent | info (opcional)
#
# GitHub / multimedia (utils/github.js):
#   GITHUB_TOKEN_UPLOAD — PAT con repo (opcional; si no, usa GITHUB_TOKEN del workflow)
#   GITHUB_REPO         — owner/repo (opcional)
#   GITHUB_BRANCH       — rama (opcional)
#
# Permisos del workflow: Settings → Actions → General → Workflow permissions:
#   Read and write (para subir artifacts de sesión).

name: WhatsApp Bot

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - '.github/workflows/bot.yml'
  workflow_dispatch:

concurrency:
  group: whatsapp-bot-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    defaults:
      run:
        working-directory: bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Comprobar secrets mínimos
        run: |
          test -n "${{ secrets.DATABASE_URL }}" || (echo "Falta secret DATABASE_URL" && exit 1)
          test -n "${{ secrets.BOT_OWNER }}" || (echo "Falta secret BOT_OWNER" && exit 1)

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Descargar sesión previa (artifact)
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: bot.yml
          name: whatsapp-session
          path: bot/sessions/main
        continue-on-error: true

      - name: Instalar dependencias
        run: npm ci

      - name: Crear .env desde secrets
        run: |
          set -e
          GH_TOKEN="${GITHUB_TOKEN_UPLOAD:-$GITHUB_TOKEN_DEFAULT}"
          {
            echo "BOT_PREFIX=${BOT_PREFIX:-/}"
            echo "BOT_NAME=${BOT_NAME:-WhatsApp Bot}"
            echo "BOT_OWNER=${BOT_OWNER}"
            echo "SESSION_DIR=${SESSION_DIR:-./sessions/main}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "BOT_ENV=github-actions"
            echo "JWT_SECRET=${JWT_SECRET:-change-me-in-production}"
            echo "WEB_PORT=${WEB_PORT:-3000}"
            echo "LOG_LEVEL=${LOG_LEVEL:-silent}"
            echo "GITHUB_TOKEN=${GH_TOKEN}"
            echo "GITHUB_REPO=${GITHUB_REPO_VAL:-$GITHUB_REPOSITORY}"
            echo "GITHUB_BRANCH=${GITHUB_BRANCH_VAL:-$GITHUB_REF_NAME}"
            if [ -n "${SUBBOTS}" ]; then echo "SUBBOTS=${SUBBOTS}"; fi
          } > .env
        env:
          BOT_PREFIX: ${{ secrets.BOT_PREFIX }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
          BOT_OWNER: ${{ secrets.BOT_OWNER }}
          SESSION_DIR: ${{ secrets.SESSION_DIR }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WEB_PORT: ${{ secrets.WEB_PORT }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          SUBBOTS: ${{ secrets.SUBBOTS }}
          GITHUB_TOKEN_UPLOAD: ${{ secrets.GITHUB_TOKEN_UPLOAD }}
          GITHUB_TOKEN_DEFAULT: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_VAL: ${{ secrets.GITHUB_REPO }}
          GITHUB_BRANCH_VAL: ${{ secrets.GITHUB_BRANCH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Ejecutar bot (supervisor keepalive)
        run: node scripts/keepalive.js

      - name: Subir sesión WhatsApp (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-session
          path: bot/sessions/main
          retention-days: 90
          if-no-files-found: warn
