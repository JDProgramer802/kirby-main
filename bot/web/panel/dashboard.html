<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0f0f0f] text-gray-100 flex">
  <div id="layout-mount"></div>
  <main class="flex-1 p-6">
    <h1 class="text-2xl font-semibold mb-6">Dashboard</h1>
    <div id="stats" class="grid grid-cols-1 sm:grid-cols-3 gap-4 text-sm"></div>
  </main>
  <script src="layout.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const r = await apiFetch('/api/dashboard/stats');
      const j = await r.json();
      const d = j.data || {};
      document.getElementById('stats').innerHTML = `
        <div class="rounded-xl border border-white/10 bg-[#1a1a1a] p-4">Bots<br/><span class="text-2xl font-bold text-violet-400">${d.bots ?? 0}</span></div>
        <div class="rounded-xl border border-white/10 bg-[#1a1a1a] p-4">Grupos<br/><span class="text-2xl font-bold text-violet-400">${d.groups ?? 0}</span></div>
        <div class="rounded-xl border border-white/10 bg-[#1a1a1a] p-4">Perfiles<br/><span class="text-2xl font-bold text-violet-400">${d.profiles ?? 0}</span></div>
      `;
    });
  </script>
</body>
</html>
